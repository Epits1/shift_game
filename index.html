<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shift Duck: Production Panic</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <h1>Shift Duck: Production Panic</h1>
    <p class="subtitle">Pixel duck vs production bugs</p>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="hud">
      <span id="score">Score: 0</span>
      <span id="lives">Lives: 3</span>
    </div>

    <div class="controls">
      <p>Controls: ← → move, Space = shoot, R = restart</p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
